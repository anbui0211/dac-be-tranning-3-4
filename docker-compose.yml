version: '3.8'

services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    volumes:
      - ./data/dynamodb:/home/dynamodblocal/data
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - ./data/s3:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  elasticmq:
    image: softwaremill/elasticmq:latest
    container_name: elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9324/queue/user-jobs-queue"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  pub-service:
    build:
      context: ./pub-service
      dockerfile: Dockerfile
    container_name: pub-service
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: user-data
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password
      SQS_ENDPOINT: http://elasticmq:9324
      SQS_QUEUE_URL: http://elasticmq:9324/queue/user-jobs-queue
      SQS_WORKER_COUNT: 20
      BATCH_INTERVAL: 5m
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: appdb
    depends_on:
      - mysql
      - minio
      - elasticmq
    networks:
      - app-network

  sub-service:
    build:
      context: ./sub-service
      dockerfile: Dockerfile
    container_name: sub-service
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      SQS_ENDPOINT: http://elasticmq:9324
      SQS_QUEUE_URL: http://elasticmq:9324/queue/user-jobs-queue
      SQS_WORKER_COUNT: 50
      REDIS_ADDR: redis:6379
    depends_on:
      - redis
      - elasticmq
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
